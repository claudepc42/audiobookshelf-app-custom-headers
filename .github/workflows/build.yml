name: Build & Release APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate web app
        run: npm run generate

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Publish to GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          tag: dev-build
          name: "Dev Build (latest main)"
          body: |
            Automated build from latest `main` branch.

            **Patches applied:**
            - Custom headers support (Cloudflare Zero Trust / reverse proxy auth) — adds a "Custom Headers" option on the server connect screen
            - Auto-connect race condition fix — app now reliably connects to your saved server on cold start

            **Installing:** If you have a previous version signed with a different key, uninstall it first.
          artifacts: ${{ steps.sign.outputs.signedReleaseFile }}
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
