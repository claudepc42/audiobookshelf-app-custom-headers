name: Build & Release APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate web app
        run: npm run generate

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEY_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          KS_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          printf '%s' "$KEYSTORE_B64" | base64 --decode > /tmp/keystore.jks
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED=android/app/build/outputs/apk/release/app-release-signed.apk
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks /tmp/keystore.jks \
            --ks-pass env:KS_PASS \
            --key-pass env:KEY_PASS \
            --ks-key-alias "$KS_ALIAS" \
            --out $SIGNED \
            $UNSIGNED
          echo "signedFile=$SIGNED" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          tag: dev-build
          name: "Dev Build (latest main)"
          body: |
            Automated build from latest `master` branch.

            **Patches applied:**
            - Custom headers on all HTTP stacks (Cloudflare Zero Trust / reverse proxy auth) — covers API calls, streaming, WebSocket, downloads, and token refresh
            - Auto-connect race condition fix — app reliably connects to your saved server on cold start

            **Installing:** If you have the Play Store version or a build signed with a different key, uninstall it first.
          artifacts: ${{ steps.sign.outputs.signedFile }}
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
